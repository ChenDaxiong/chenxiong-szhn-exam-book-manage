# 图书管理系统 - 生产环境配置

# 当前先用H2，后续可替换独立的mysql
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:file:./data/book_system;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=

# SQL 初始化
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/schema.sql
spring.sql.init.data-locations=classpath:db/bookInit.sql

# Redis 配置
spring.redis.host=127.0.0.1
spring.redis.port=6379
spring.redis.password=
spring.redis.database=0
spring.redis.timeout=10000
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.max-idle=8
spring.redis.lettuce.pool.min-idle=0
spring.redis.lettuce.pool.max-wait=-1

# 缓存配置（prod 使用 Redis）
cache.type=redis
cache.expire-seconds=300

# Session 配置
session.timeout-seconds=7200

# 日志级别
logging.level.com.chenxiong.szhn.exam.book.manage=info
logging.file.name=logs/book-manage.log
# db 类型
mybatis-plus.db-type=H2
