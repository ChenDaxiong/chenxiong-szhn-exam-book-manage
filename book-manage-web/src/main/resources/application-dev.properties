# 图书管理系统 - 开发环境配置

# H2 内存数据库配置
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:book_system;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=

# SQL 初始化
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/schema.sql
spring.sql.init.data-locations=classpath:db/bookInit.sql

# 禁用 Redis 自动配置（dev 环境不需要）
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

# ES 全局开关
es.enabled=false

# 缓存配置（dev 使用本地 Caffeine）
cache.type=caffeine
cache.expire-seconds=300
cache.local.max-size=1000

# Session 配置
session.timeout-seconds=7200

# 日志级别
logging.level.com.chenxiong.szhn.exam.book.manage=debug
